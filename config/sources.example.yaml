# AutoArchitector — единый конфиг источников
# Скопировать в config/sources.yaml и заполнить своими значениями.
# Все поля с комментарием "# опционально" можно опустить.

project_name: example-landscape

# ─────────────────────────────────────────────
# СЕРВИСНЫЕ РЕПОЗИТОРИИ
# Каждая запись — один микросервис или приложение.
# ─────────────────────────────────────────────
repositories:
  - name: billing-service
    type: java                              # java | typescript
    origin: https://github.com/your-org/billing-service.git
    branch: main
    path: ./workspace/repos/billing-service  # куда клонировать локально
    enabled: true

  - name: frontend-bff
    type: typescript
    origin: https://github.com/your-org/frontend-bff.git
    branch: develop
    path: ./workspace/repos/frontend-bff
    enabled: true

  - name: auth-service
    type: java
    origin: https://github.com/your-org/auth-service.git
    branch: main
    path: ./workspace/repos/auth-service
    enabled: true

# ─────────────────────────────────────────────
# KUBERNETES / NETWORK POLICY
# Репозитории и директории с манифестами по окружениям.
# network_policy_repos — отдельные репо с политиками (если хранятся отдельно от сервисов).
# ─────────────────────────────────────────────
kubernetes:
  # Общая директория с K8s-манифестами (Deployment, Service, Ingress, ConfigMap…)
  manifests_path: ./workspace/repos/platform-k8s

  # Репозитории, в которых хранятся NetworkPolicy (если отдельно от манифестов)
  network_policy_repos:
    - name: k8s-network-policies
      origin: https://github.com/your-org/k8s-network-policies.git
      branch: main
      path: ./workspace/repos/k8s-network-policies
      enabled: true

  # Конкретные директории с NetworkPolicy по окружениям
  # (могут быть внутри network_policy_repos или manifests_path)
  network_policies:
    test:
      - ./workspace/repos/k8s-network-policies/envs/test
    demo:
      - ./workspace/repos/k8s-network-policies/envs/demo
    prod:
      - ./workspace/repos/k8s-network-policies/envs/prod
      - ./workspace/repos/platform-k8s/overlays/prod/network-policies

# ─────────────────────────────────────────────
# GITLAB / ACL
# Репозитории с ACL, RBAC, группами доступа.
# ─────────────────────────────────────────────
access_control:
  # Репозитории с ACL-манифестами (GitLab Access Control, RBAC YAML, OPA policies…)
  repos:
    - name: platform-acl
      origin: https://gitlab.com/your-org/platform-acl.git
      branch: main
      path: ./workspace/repos/platform-acl
      enabled: true

  # Директории с ACL-файлами по окружениям (внутри склонированных repos)
  policies:
    test:
      - ./workspace/repos/platform-acl/envs/test
    demo:
      - ./workspace/repos/platform-acl/envs/demo
    prod:
      - ./workspace/repos/platform-acl/envs/prod

# ─────────────────────────────────────────────
# YANDEX CLOUD
# Экспорт топологии, network groups, security groups.
# ─────────────────────────────────────────────
cloud:
  provider: yandex_cloud

  # Статический файл-экспорт топологии (VM, VPC, ALB, PostgreSQL, Object Storage…)
  # Получить: yc resource-manager folder list-resources --format json > topology.json
  topology_file: ./inputs/yandex-cloud-topology.json

  # Network groups / Security groups
  # Получить: yc vpc security-group list --format json > sg.json
  network_groups_file: ./inputs/yandex-cloud-security-groups.json  # опционально

  # Статические файлы с описанием VPC и подсетей
  # Получить: yc vpc network list --format json > networks.json
  networks_file: ./inputs/yandex-cloud-networks.json  # опционально

  # Terraform state (если инфраструктура описана в Terraform)
  terraform_state_file: ./inputs/terraform.tfstate  # опционально

# ─────────────────────────────────────────────
# НАСТРОЙКИ ВЫВОДА
# ─────────────────────────────────────────────
output:
  render_svg: false    # true — рендерить SVG через mermaid-cli (требует Node.js)
  formats:
    - mermaid          # всегда генерируется
    - json             # нормализованный inventory
    # - svg            # только если render_svg: true и установлен mmdc
    # - structurizr    # планируется в следующей версии
